name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API (vitest + Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fad_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/fad_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24" }
      - run: npm ci
      - name: codegen is up to date
        run: |
          npm run codegen
          git diff --exit-code apps/api/src/generated || \
            { echo "::error::generated types are stale — run npm run codegen"; exit 1; }
      - name: api bundle is up to date
        # The committed esbuild artifact (apps/api/api/index.js) IS the Vercel function.
        # It drifted from src for ~130 PRs (#180) → prod served stale code. esbuild is
        # deterministic and `npm ci` pins the version, so a rebuild must match byte-for-byte.
        working-directory: apps/api
        run: |
          npm run build:fn
          git diff --exit-code api/index.js || \
            { echo "::error::committed Vercel bundle (apps/api/api/index.js) is stale — run 'npm run build:fn' in apps/api and commit it"; exit 1; }
      - name: api tests
        working-directory: apps/api
        run: npx vitest run

  cli:
    name: CLI (Kotlin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - working-directory: apps/cli
        run: ./gradlew --no-daemon build

  client:
    name: Client core + feed UI (Compose, headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      # Cheap guard: every commonMain `expect` has an `actual` per platform (android/
      # desktop/ios). CI doesn't compile iOS, so a missing iosMain actual would merge
      # undetected (see #225). Pure grep — fails fast before the gradle build.
      - name: expect/actual parity (incl. iOS)
        run: bash scripts/check-expect-actual.sh
      # TASK-KMP consolidated :client into the single apps/ Gradle build —
      # apps/client no longer has its own wrapper. Run the module task from apps/.
      - working-directory: apps
        run: ./gradlew --no-daemon :client:desktopTest

  debugdrawer:
    name: Debug Drawer (Compose-MP lib, headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - working-directory: apps
        run: ./gradlew --no-daemon :debugdrawer:desktopTest :debugdrawer-noop:desktopTest :debugdrawer-redux:desktopTest

  android:
    name: Android app (assembleDebug — compile smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      # google-services.json is gitignored + per-env (the real config is a release
      # secret). For a compile-only smoke a stub is enough — it satisfies the gms
      # plugin without shipping real Firebase config (same stub release-android.yml
      # falls back to). Google sign-in is non-functional here — irrelevant to a build.
      - name: Stub google-services.json (compile-only)
        run: |
          cat > apps/androidApp/google-services.json <<'JSON'
          {
            "project_info": { "project_number": "000000000000", "project_id": "dayfold-stub", "storage_bucket": "dayfold-stub.appspot.com" },
            "client": [ {
              "client_info": { "mobilesdk_app_id": "1:000000000000:android:0000000000000000", "android_client_info": { "package_name": "com.sloopworks.dayfold" } },
              "oauth_client": [ { "client_id": "000000000000-stub.apps.googleusercontent.com", "client_type": 3 } ],
              "api_key": [ { "current_key": "AIzaSyStubStubStubStubStubStubStubStub00" } ],
              "services": { "appinvite_service": { "other_platform_oauth_client": [ { "client_id": "000000000000-stub.apps.googleusercontent.com", "client_type": 3 } ] } }
            } ],
            "configuration_version": "1"
          }
          JSON
      - name: Ensure the Android platform is installed (compileSdk 37 / Android 16)
        run: |
          set -euo pipefail
          SDK="${ANDROID_HOME:-$ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          yes 2>/dev/null | "$SDK" --licenses >/dev/null 2>&1 || true
          "$SDK" "platforms;android-37" "build-tools;36.0.0" >/dev/null 2>&1 \
            || "$SDK" "platforms;android-37.0" "build-tools;36.0.0" >/dev/null 2>&1 || true
      # Builds the real Compose app (debug variant): :client + debug drawer + fake backend.
      - name: assembleDebug
        working-directory: apps
        run: ./gradlew --no-daemon :androidApp:assembleDebug

  naming-guard:
    name: No legacy com.familyai package (ADR 0026)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: reject com.familyai / FAMILYAI_API in code
        run: |
          if git grep -nE 'com\.familyai|FAMILYAI_API' -- apps packages ':!**/build/**'; then
            echo "::error::legacy com.familyai / FAMILYAI_API found — package is com.sloopworks.dayfold per ADR 0026"
            exit 1
          fi

  firebase-emulator:
    name: API — real Firebase Auth Emulator (S2, ADR 0027)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fad_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/fad_test
      FIREBASE_PROJECT_ID: dayfold-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24" }
      - uses: actions/setup-java@v4   # the Auth emulator runs on the JVM
        with: { distribution: temurin, java-version: "17" }
      - run: npm ci
      - name: codegen (generated types the API imports)
        run: npm run codegen
      - name: auth emulator + real-path integration test
        working-directory: apps/api
        # emulators:exec starts the Auth emulator, exports FIREBASE_AUTH_EMULATOR_HOST,
        # runs the command, then tears it down. The integration test is skipIf-gated on
        # that env var, so it only executes inside this wrapper.
        run: >-
          npx --yes firebase-tools emulators:exec --only auth --project dayfold-test
          "npx vitest run test/auth-firebase-emulator.test.ts"
