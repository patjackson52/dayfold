# Secret-leak guard (gitleaks). The licensing research (ADR 0032) named committed
# secrets the #1 OSS failure mode (~2x with AI-assisted code); this catches them on
# every PR — useful now (private repo hygiene) and a prerequisite for going public.
#
# Scans only the commits a PR ADDS (base..head), so it fails on NEW secrets without
# tripping on pre-existing history — the full-history scan + rotate is the operator's
# one-time pre-flight (ADR 0032). Uses the gitleaks CLI directly (the gitleaks-action
# needs a paid license on org repos).
name: Secret Scan

on:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4 (SHA-pinned)
        with:
          fetch-depth: 0     # need base + head commits for the range scan

      - name: Install gitleaks
        env:
          VERSION: "8.30.1"
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks version

      - name: Scan this PR's new commits for secrets
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # --redact: never print the secret. --exit-code 1: fail the check on a finding.
          ./gitleaks detect --source . --no-banner --redact --exit-code 1 \
            --log-opts="${BASE}..${HEAD}"
